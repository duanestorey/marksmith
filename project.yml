name: Marksmith
options:
  bundleIdPrefix: com.marksmith
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: "0.5.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Marksmith:
    type: application
    platform: macOS
    sources:
      - path: Marksmith
        excludes:
          - Resources/**
      - path: Marksmith/Resources
        excludes:
          - Assets.xcassets
        buildPhase: resources
      - path: Marksmith/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marksmith.app
        PRODUCT_NAME: Marksmith
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Marksmith/Info.plist
        CODE_SIGN_ENTITLEMENTS: Marksmith/Marksmith.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
    dependencies:
      - package: swift-markdown
        product: Markdown
    entitlements:
      path: Marksmith/Marksmith.entitlements
